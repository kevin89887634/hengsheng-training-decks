<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恒晟集团 · 培训演示集</title>
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/hub.css">
</head>
<body>
<button class="tgl" id="theme" aria-label="切换深色"><svg id="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg></button>

<header class="hero">
  <div class="logo"><span class="mk"><img src="assets/img/logo.png" alt=""></span>恒晟集团</div>
  <h1>培训演示集</h1>
  <p>一套配色、一个入口。每一份课程都是一个独立页面，点开即可全屏放映，支持白天 / 夜间。新课程随时加进来。</p>
</header>

<main class="grid" id="grid"></main>

<script>
/* ★ 加新课程：复制下面一项，改好内容，并把对应 HTML 放进 decks/你的目录/index.html 即可 ★
   accent 可选：'#2A4A8C'(蓝) / '#A87E2E'(金) / '#2C8A60'(绿) / '#B14E39'(红) */
var DECKS = [
  {
    title: "恒晟平台招商方案 · 8 部分 115 分钟",
    desc: "20 slide · 8 部分(产业痛点/华人画像/LIMRA/恒晟优势/5年轨迹/5产品线/NLG·PALIG·AIG·国家人寿 4 供应商独立页/拓客·起步·成长 3 阶段独立页/Cindy 真实故事/加入流程/FAQ 无答案)· v3 修正(115 分钟/HS Logo 60px/3 圆点/LIMRA 简介/真实数据/Cindy 不编故事)+ 4 语义色 30+ + animateMotion 22 + AI 教练。配套讲义 + 大纲可下载。",
    tag: "对外招生 · 招商方案",
    mark: "招",
    accent: "#A87E2E",
    href: "decks/hengsheng-recruit-pitch/index.html"
  },
  {
    title: "恒晟佣金制度 · 从入门到精通",
    desc: "新人入职必学:3 公式 / 7 档阶梯 TA→CEO 50%-90% / 4 数字例子 / 4 被动收入 / 三步走 30-60-180 天 / 8 Q&A。讲师拿讲义就能讲,学员拿 deck 就能学。",
    tag: "新人入职",
    mark: "新",
    accent: "#A87E2E",
    href: "decks/hengsheng-commission/index.html"
  },
  {
    title: "IUL 退休规划 · 4 类客户",
    desc: "从产品出发,讲清楚哪类人该选哪张保单。35-55 退休金 / 0-12 教育金 / 50-70 传承 / 高净值资产保障。8 页 5 模块,真实 Coverage IUL 培训数据。",
    tag: "产品培训",
    mark: "退",
    accent: "#A87E2E",
    href: "decks/iul-four-clients/index.html"
  },
  {
    title: "爱与守护 · 保险销售新范式",
    desc: "成交演练：用「分享爱」的模式去分享保险。痛点→转念→方法→实战→升华。",
    tag: "成交演练",
    mark: "爱",
    accent: "#2A4A8C",
    href: "decks/ai-love-protection/index.html"
  },
  {
    title: "一对一保险销售 · 核心方法论",
    desc: "一对一销售内部培训精华：需求定位→保额计算→产品演示→生前福利→异议处理→成交→金句库。22 页 7 大模块。",
    tag: "方法论 SOP",
    mark: "销",
    accent: "#A87E2E",
    href: "decks/song-one-on-one/index.html"
  },
  {
    title: "保险销售跟进 · 系统化方法论",
    desc: "1:4:7 法则 · 六类客户 · ABC 借力法则 · 销售八步闭环。从「发传单」到「陪跑成交」的 88% 业绩差距。15 页 5 大模块。",
    tag: "跟进系统",
    mark: "跟",
    accent: "#2A4A8C",
    href: "decks/sales-follow-up/index.html"
  },
  {
    title: "产品介绍 · 动画版",
    desc: "恒晟集团产品全景介绍。28 页动画演示,适合面客 / 团队培训开场使用。",
    tag: "产品培训",
    mark: "产",
    accent: "#2C8A60",
    href: "decks/product-intro/index.html"
  }
];

var grid = document.getElementById('grid');
if (!DECKS.length) {
  grid.innerHTML = '<div class="empty">还没有课程，往 index.html 的 DECKS 数组里加第一个吧。</div>';
} else {
  grid.innerHTML = DECKS.map(function(d){
    return '<a class="deckcard" href="'+d.href+'">'
      + '<div class="cover" style="background:'+d.accent+'"><span class="mark">'+(d.mark||'')+'</span></div>'
      + '<div class="meta"><span class="tg">'+d.tag+'</span>'
      + '<div class="tt">'+d.title+'</div>'
      + '<div class="ds">'+d.desc+'</div>'
      + '<div class="go">进入放映 →</div></div></a>';
  }).join('');
}

/* 白天 / 夜间 */
(function(){
  var root=document.documentElement, ti=document.getElementById('ti');
  var sun='<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
  var moon='<path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"/>';
  function setTheme(t){root.setAttribute('data-theme',t);ti.innerHTML=(t==='dark'?sun:moon);try{localStorage.setItem('hs-theme',t);}catch(e){}}
  document.getElementById('theme').onclick=function(){setTheme(root.getAttribute('data-theme')==='dark'?'light':'dark');};
  try{var s=localStorage.getItem('hs-theme'); if(s) setTheme(s); else ti.innerHTML=moon;}catch(e){ti.innerHTML=moon;}
})();
</script>
</body>
</html>
